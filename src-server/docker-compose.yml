services:
  postgres:
    # pgvector 官方镜像（内置 vector 扩展），migration 005 的 CREATE EXTENSION vector
    # 在干净容器也能跑。用 pg16（本地已有 + 与 CI ci.yml src-server-test 一致；
    # pg15 registry 直连失败，避免拉取）。
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: llmwiki
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
